<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sbBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3FB1A3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B5E5E;stop-opacity:1" />
    </linearGradient>

    <filter id="sbShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="0" dy="10" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="110" fill="url(#sbBgGrad)" />

  <g filter="url(#sbShadow)">
    <rect x="110" y="130" width="292" height="252" rx="30" stroke="white" stroke-width="22" fill="none" />
    
    <line x1="207" y1="130" x2="207" y2="382" stroke="white" stroke-width="12" stroke-opacity="0.4" stroke-linecap="round" />
    <line x1="304" y1="130" x2="304" y2="382" stroke="white" stroke-width="12" stroke-opacity="0.4" stroke-linecap="round" />

    <rect x="228" y="190" width="130" height="85" rx="15" fill="white" />
    
    <rect x="248" y="215" width="90" height="8" rx="4" fill="#3FB1A3" />
    <rect x="248" y="235" width="50" height="8" rx="4" fill="#3FB1A3" opacity="0.6" />
  </g>
</svg>