name: Feature Request
description: Suggest an improvement or new feature for SnapBoard
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your idea!  
        SnapBoard aims to stay minimal, stable, and workflow‑focused.  
        Please describe the problem your feature solves.

  - type: textarea
    id: problem
    attributes:
      label: Problem / Use Case
      placeholder: What problem does this solve? What workflow is blocked or inefficient?

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      placeholder: Describe the feature, interaction, or workflow improvement.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered (optional)
      placeholder: Any other approaches you thought about?

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes (optional)
      placeholder: Screenshots, examples, or extra context.
