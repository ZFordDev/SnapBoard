name: Build and Release SnapBoard

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:

  build_linux:
    name: Build Linux (AppImage + Deb)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Tailwind
        run: npm run build:css

      - name: Build Linux artifacts
        run: npx electron-builder --linux AppImage deb --publish=never

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            dist/SnapBoard.AppImage
            dist/SnapBoard.AppImage.blockmap
            dist/*.deb
            dist/latest-linux.yml

  build_windows:
    name: Build Windows (NSIS)
    runs-on: windows-latest
    needs: build_linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Tailwind
        run: npm run build:css

      - name: Build Windows installer
        run: npx electron-builder --win nsis --publish=never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            dist/SnapBoard-Setup.exe
            dist/SnapBoard-Setup.exe.blockmap
            dist/latest.yml

  publish_release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build_linux, build_windows]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: release/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
