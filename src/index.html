<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SnapBoard</title>
    <link rel="stylesheet" href="styles/styles.css" />
  </head>
  <body class="flex flex-col h-screen overflow-hidden">

    <!-- Edge Trigger -->
    <div id="trigger-zone" class="fixed left-0 top-0 h-full w-2 z-50 cursor-pointer hover:bg-blue-500/10 transition-colors"></div>

    <!-- Main Sidebar (SnapDock Companion) -->
    <aside id="snap-sidebar" class="fixed left-0 top-0 h-full w-72 
    bg-white/30 backdrop-blur-xl border-r border-white/10 shadow-xl 
    z-40 p-6 flex flex-col transition-transform -translate-x-full">
      <div class="flex items-center justify-between mb-8">
        <div class="flex items-center gap-3">
          <h1 class="text-xl font-semibold tracking-tight text-slate-900">SnapBoard</h1>
        </div>
        <button id="close-btn" class="text-slate-400 hover:text-slate-900 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m18 6-12 12" />
            <path d="m6 6 12 12" />
          </svg>
        </button>
      </div>

      <nav class="space-y-1 flex-1">
        <div class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-3 ml-2">Boards</div>
        <div id="board-list" class="space-y-1 px-2">
          <!-- populated by JS -->
        </div>
        <button id="new-board-btn" class="mt-2 w-full text-left text-sm text-blue-600 hover:underline">+ New Board</button>
      </nav>

      <div class="mt-6 pt-6 border-t border-black/5">
        <div class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-3 ml-2">Settings</div>
        <a href="#" class="flex items-center gap-3 p-3 rounded-xl text-slate-500 hover:bg-black/5 hover:text-slate-900 transition-all">
          <svg xmlns="assets/logo.png" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3" />
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 5.63 19a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 .34 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h-.09A1.65 1.65 0 0 0 .34 9a1.65 1.65 0 0 0 .33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 5.63 5a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09A1.65 1.65 0 0 0 12.37 5a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.66 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h.09A1.65 1.65 0 0 0 19.66 15z" />
          </svg>
          Settings
        </a>
        <div id="update-status" class="flex items-center gap-3 p-3 rounded-xl text-slate-500">
          Checking for updates...
        </div>
      </div>
    </aside>

    <!-- Header / Frameless Drag Area -->
    <header class="flex-none h-12 flex items-center justify-between px-6 z-10 
    bg-white/20 backdrop-blur-xl border-b border-white/10 shadow-sm">
  <div class="flex items-center gap-4">
    <button id="menu-btn" class="p-2 hover:bg-white/10 rounded-lg transition-colors text-slate-700">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="4" x2="20" y1="12" y2="12" />
        <line x1="4" x2="20" y1="6" y2="6" />
        <line x1="4" x2="20" y1="18" y2="18" />
      </svg>
    </button>

    <div class="text-sm font-semibold text-slate-800">
      <span id="board-name">Daily Workflow Board</span>
      <span class="text-xs font-normal text-slate-500 ml-2">Local Storage</span>
    </div>
  </div>

  <div class="flex items-center gap-3">
    <button id="add-column-btn" class="text-xs font-medium px-3 py-1.5 rounded-md 
      bg-white/40 border border-white/20 text-slate-700 shadow-sm 
      hover:bg-white/60 transition-all">
      Add Column
    </button>
  </div>
</header>


    <!-- Kanban Area -->
    <main id="board" class="flex-1 flex overflow-x-auto p-8 gap-6"></main>

    <!-- Footer -->
    <footer class="flex-none h-10 flex items-center justify-center 
    text-xs text-slate-500 bg-white/20 backdrop-blur-md border-t border-white/10">
      <span id="versionTag" class="version"></span>
    </footer>

    <script type="module" src="scripts.js"></script>
  </body>
</html>
