<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SnapBoard</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body class="bg-gradient-to-br from-[#232526] to-[#414345] select-none overflow-hidden">

  <!-- Dock -->
  <div id="dock"
       class="h-16 w-full flex items-center justify-between px-6
              bg-white/20 dark:bg-black/30 backdrop-blur-lg border-b border-white/10 shadow-md drag-region">

    <div class="font-bold text-lg tracking-wide text-white/90 font-sans select-none">SnapBoard</div>

    <div class="flex gap-3">
      <button id="min-btn" class="w-4 h-4 rounded-full bg-yellow-400 shadow hover:scale-110 hover:ring-2 hover:ring-yellow-300 transition-all duration-150"></button>
      <button id="close-btn" class="w-4 h-4 rounded-full bg-red-500 shadow hover:scale-110 hover:ring-2 hover:ring-red-400 transition-all duration-150"></button>
    </div>
  </div>

  <!-- Glass Panel -->
  <div id="panel"
       class="absolute top-16 left-0 right-0 bottom-0
              bg-white/10 dark:bg-[#232526]/80 border border-white/10 rounded-b-2xl
              shadow-2xl backdrop-blur-xl transition-all duration-300">

    <!-- Column Container -->
    <div id="board"
         class="flex flex-row gap-6 p-6 overflow-x-auto h-full">
      <!-- Columns will be injected here -->
    </div>

  </div>

  <script src="renderer.js"></script>
</body>
</html>
