<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- CSP (safe for Tailwind + module scripts) -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data:;
      "
    />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SnapBoard</title>

    <!-- Tailwind output -->
    <link rel="stylesheet" href="src/styles/index.css" />
  </head>

  <body class="flex flex-col h-screen overflow-hidden bg-slate-100 light-theme">

    <!-- Edge Trigger -->
    <div id="trigger-zone" class="trigger-zone"></div>
    <!-- Sidebar -->
    <aside id="snap-sidebar" class="sidebar">
      <div class="sidebar-header">
        <button id="close-btn" class="sidebar-close">✕</button>
      </div>
    
      <nav class="sidebar-nav">
        <h3>Boards</h3>
        <ul id="board-list"></ul>
        <button id="new-board-btn" class="sidebar-action">+ New Board</button>
      </nav>
    
      <div class="sidebar-footer">
        <h3>Updates</h3>
        <button id="update-btn" class="sidebar-update-btn">Update</button>
      </div>
    </aside>


    <!-- Header -->
    <header
      class="flex-none h-12 flex items-center justify-between px-6 z-10
      bg-white/20 backdrop-blur-xl border-b border-white/10 shadow-sm"
    >
      <div class="flex items-center gap-4">
        <button
          id="menu-btn"
          class="p-2 hover:bg-white/10 rounded-lg transition-colors text-slate-700"
        >
          ☰
        </button>

        <div class="text-sm font-semibold text-slate-800">
          <span id="board-name">My Board</span>
        </div>
      </div>

      <div class="flex items-center gap-3">
        <button id="add-column-btn" class="sb-btn">
          <span class="icon">＋</span>
          <span>Add Column</span>
        </button>
      </div>
    </header>

    <!-- Board Area -->
    <main
      id="board"
      class="flex-1 flex overflow-x-auto p-8 gap-6"
    ></main>

    <!-- Footer -->
    <footer class="flex-none h-10 flex items-center justify-center text-xs text-slate-500 bg-white/20 backdrop-blur-md border-t border-white/10" >
      
      <span id="version-info"></span>

      <div class="sb-footer-right">
        <span id="update-status" class="sb-update-status"></span>
      </div>
    </footer>

    <!-- Renderer entrypoint -->
    <script src="dist/bundle.js"></script>
  </body>
</html>
