<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- CSP (safe for Tailwind + module scripts) -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data:;
      "
    />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SnapBoard</title>

    <!-- Tailwind output -->
    <link rel="stylesheet" href="src/styles/styles.css" />
  </head>

  <body class="flex flex-col h-screen overflow-hidden bg-slate-100">

    <!-- Edge Trigger -->
    <div
      id="trigger-zone"
      class="fixed left-0 top-0 h-full w-2 z-50 cursor-pointer hover:bg-blue-500/10 transition-colors"
    ></div>

    <!-- Sidebar -->
    <aside
      id="snap-sidebar"
      class="fixed left-0 top-0 h-full w-72
      bg-white/30 backdrop-blur-xl border-r border-white/10 shadow-xl
      z-40 p-6 flex flex-col transition-transform -translate-x-full"
    >
      <div class="flex items-center justify-between mb-8">
        <h1 class="text-xl font-semibold tracking-tight text-slate-900">
          SnapBoard
        </h1>

        <button
          id="close-btn"
          class="text-slate-400 hover:text-slate-900 transition-colors"
        >
          ✕
        </button>
      </div>

      <!-- Boards (future feature) -->
      <nav class="space-y-1 flex-1">
        <div
          class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-3 ml-2"
        >
          Boards
        </div>

        <div id="board-list" class="space-y-1 px-2">
          <!-- populated later -->
        </div>

        <button
          id="new-board-btn"
          class="mt-2 w-full text-left text-sm text-blue-600 hover:underline"
        >
          + New Board
        </button>
      </nav>

      <!-- Settings + Update -->
      <div class="mt-6 pt-6 border-t border-black/5">
        <div
          class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-3 ml-2"
        >
          Updates
        </div>

        <button
          id="update-btn"
          class="w-full p-3 rounded-xl text-sm text-slate-700 bg-white/40 border border-white/20 shadow-sm hover:bg-white/60 transition-all"
        >
          Update
        </button>
      </div>
    </aside>

    <!-- Header -->
    <header
      class="flex-none h-12 flex items-center justify-between px-6 z-10
      bg-white/20 backdrop-blur-xl border-b border-white/10 shadow-sm"
    >
      <div class="flex items-center gap-4">
        <button
          id="menu-btn"
          class="p-2 hover:bg-white/10 rounded-lg transition-colors text-slate-700"
        >
          ☰
        </button>

        <div class="text-sm font-semibold text-slate-800">
          <span id="board-name">My Board</span>
        </div>
      </div>

      <div class="flex items-center gap-3">
        <button
          id="add-column-btn"
          class="text-xs font-medium px-3 py-1.5 rounded-md
          bg-white/40 border border-white/20 text-slate-700 shadow-sm
          hover:bg-white/60 transition-all"
        >
          Add Column
        </button>
      </div>
    </header>

    <!-- Board Area -->
    <main
      id="board"
      class="flex-1 flex overflow-x-auto p-8 gap-6"
    ></main>

    <!-- Footer -->
    <footer
      class="flex-none h-10 flex items-center justify-center
      text-xs text-slate-500 bg-white/20 backdrop-blur-md border-t border-white/10"
    >
      <span id="version-info"></span>
    </footer>

    <!-- Renderer entrypoint -->
    <script src="dist/bundle.js"></script>
  </body>
</html>
